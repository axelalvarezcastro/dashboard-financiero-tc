<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanzas Trichter Consulting 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23090909'/><text y='22' x='4' font-size='18' font-weight='bold' fill='%23c59b3f'>TC</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #090909; --card: #111111; --border: #1f1d1a;
      --accent: #c59b3f; --accent-dim: #c59b3f22;
      --accent-light: #d4af5a; --accent-dark: #a07e2e;
      --red: #e04545; --red-dim: #e0454522;
      --green: #3dbb7d; --green-dim: #3dbb7d22;
      --blue: #5a9fd4; --purple: #9b7fd4;
      --text-1: #f2ece0; --text-2: #8a8070; --text-3: #5a5348;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text-1); font-family: 'Poppins', -apple-system, sans-serif; padding: 0 20px 60px; min-height: 100vh; }

    .header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
    .logo-img { width: 48px; height: 48px; border-radius: 10px; }
    .title { font-size: 28px; font-weight: 700; font-family: 'Poppins', sans-serif; color: var(--accent); }
    .subtitle { font-size: 14px; color: var(--text-2); font-family: 'Poppins', sans-serif; }
    .last-update { font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; }
    .refresh-btn { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
    .refresh-btn:hover { background: var(--accent); color: var(--bg); }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 28px; position: relative; overflow: hidden; transition: transform 0.2s; }
    .kpi:hover { transform: translateY(-2px); }
    .kpi-icon { position: absolute; top: -20px; right: -20px; font-size: 80px; opacity: 0.06; }
    .kpi-label { font-size: 12px; color: var(--text-2); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
    .kpi-value { font-size: 36px; font-weight: 700; font-family: 'Poppins', sans-serif; line-height: 1.1; }
    .kpi-sub { font-size: 13px; color: var(--text-3); margin-top: 8px; }
    .kpi-trend { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; margin-right: 6px; }

    .section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; margin-top: 40px; }
    .section-title h2 { font-size: 20px; font-weight: 700; font-family: 'Poppins', sans-serif; color: var(--text-1); }
    .section-title .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); margin-left: 12px; }

    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .two-col { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }

    .cat-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .cat-dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 10px; }
    .cat-name { font-size: 13px; color: var(--text-2); }
    .cat-value { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .cat-pct { font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; width: 40px; text-align: right; margin-left: 12px; }

    .client-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .client-rank { font-size: 14px; font-weight: 700; color: var(--text-3); font-family: 'JetBrains Mono', monospace; width: 24px; }
    .client-info { flex: 1; }
    .client-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .client-name { font-size: 14px; font-weight: 600; }
    .client-total { font-size: 14px; font-weight: 600; color: var(--accent-light); font-family: 'JetBrains Mono', monospace; }
    .client-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .client-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease-out; }

    .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .health-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .health-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
    .health-value { font-size: 24px; font-weight: 700; font-family: 'Poppins', sans-serif; }
    .health-desc { font-size: 12px; color: var(--text-3); margin-top: 4px; }

    .loading { text-align: center; padding: 60px; color: var(--text-2); }
    .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    .section-title .line { background: linear-gradient(90deg, var(--accent-dark), transparent); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { margin-top: 48px; padding: 20px 0; border-top: 1px solid var(--border); text-align: center; }
    .footer p { font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }

    @media (max-width: 768px) {
      .kpi-value { font-size: 28px; }
      .title { font-size: 22px; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Cargando datos de Google Sheets...</p>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN - Cambiar estos valores
// ============================================================
const SPREADSHEET_ID = '1wI5pQfW_rGrwoH56DpdBaiIavHNSdNgwreOCIsJyTWs';
const SHEET_NAME = 'REGISTRO';
const HEADER_ROW = 3; // Row where headers are (ID, Fecha, Mes, etc.)
// ============================================================

const COLORS = ['#c59b3f','#d4af5a','#a07e2e','#5a9fd4','#9b7fd4','#3dbb7d','#e0a56a','#7eb89e'];
const MESES_ORDER = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function parseMonto(str) {
  if (!str) return 0;
  // Remove currency text (MXN, USD, $) and spaces
  let cleaned = String(str).replace(/[A-Za-z$\s]/g, '');
  // Detect Spanish format: 5.400,00 (dots=thousands, comma=decimal)
  if (cleaned.includes(',') && cleaned.includes('.')) {
    // If last separator is comma → Spanish format (1.234,56)
    if (cleaned.lastIndexOf(',') > cleaned.lastIndexOf('.')) {
      cleaned = cleaned.replace(/\./g, '').replace(',', '.');
    } else {
      // English format (1,234.56)
      cleaned = cleaned.replace(/,/g, '');
    }
  } else if (cleaned.includes(',')) {
    // Could be "5400,00" (decimal) or "5,400" (thousands)
    const parts = cleaned.split(',');
    if (parts[parts.length - 1].length === 2) {
      cleaned = cleaned.replace(',', '.'); // decimal comma
    } else {
      cleaned = cleaned.replace(/,/g, ''); // thousands comma
    }
  } else if (cleaned.includes('.')) {
    // Only dots, no commas. Could be:
    // "89.406" → Spanish thousands (89406) if 3 digits after dot
    // "89.4"   → English decimal (89.4) if NOT 3 digits after dot
    // "1.234.567" → multiple dots = thousands separators
    const dotParts = cleaned.split('.');
    if (dotParts.length > 2) {
      // Multiple dots → all are thousands separators (e.g. "1.234.567")
      cleaned = cleaned.replace(/\./g, '');
    } else if (dotParts[1] && dotParts[1].length === 3 && parseFloat(cleaned) >= 1) {
      // Single dot with exactly 3 digits after → thousands separator
      cleaned = cleaned.replace('.', '');
    }
    // Otherwise it's a normal decimal point, leave as is
  }
  return parseFloat(cleaned) || 0;
}

function fmt(n) {
  const num = parseFloat(n) || 0;
  if (num >= 1000000) return '$' + (num/1000000).toFixed(1) + 'M';
  if (num >= 1000) return '$' + Math.round(num).toLocaleString('es-MX');
  return '$' + num;
}

function parseCSV(text) {
  const lines = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === '\n' && !inQuotes) { lines.push(current); current = ''; continue; }
    current += ch;
  }
  if (current.trim()) lines.push(current);

  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = [];
    let val = '';
    let inQ = false;
    for (let j = 0; j < lines[i].length; j++) {
      const c = lines[i][j];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { vals.push(val.trim()); val = ''; continue; }
      val += c;
    }
    vals.push(val.trim());
    const obj = {};
    headers.forEach((h, idx) => { if (h) obj[h] = vals[idx] || ''; });
    rows.push(obj);
  }
  return rows;
}

async function fetchCSVSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  const text = await res.text();
  if (!text || text.includes('<html') || text.includes('<!DOCTYPE')) return [];
  return parseCSV(text);
}

async function fetchSheetData() {
  const rows = await fetchCSVSheet(SHEET_NAME);
  return rows.filter(r => r.Tipo);
}

async function fetchForecastData() {
  try {
    const rows = await fetchCSVSheet('FORECAST');
    // FORECAST has: Mes, Concepto, Proyectado, Real, Variacion $, Variacion %
    const forecast = {};
    rows.forEach(r => {
      const mes = (r.Mes || '').trim();
      const concepto = (r.Concepto || '').trim();
      if (!mes) return;
      if (!forecast[mes]) forecast[mes] = {};
      if (concepto === 'Total Ingresos') forecast[mes].ingProyectado = parseMonto(r.Proyectado);
      if (concepto === 'Total Gastos') forecast[mes].gastoProyectado = parseMonto(r.Proyectado);
      if (concepto === 'Profit') forecast[mes].profitProyectado = parseMonto(r.Proyectado);
    });
    return forecast;
  } catch (e) {
    return {};
  }
}

function processData(rows, forecast) {
  forecast = forecast || {};
  const data = { monthly: [], incomeByCategory: [], expenseByCategory: [], topClients: [], totals: {}, incomeByType: {} };

  // Categories that are NOT operating expenses (distributions/financial items)
  const NON_OPERATING = ['Retiro Socio', 'Impuestos'];

  // Recurring income categories vs New income
  const RECURRING_CATS = ['Software Recurrente', 'High Ticket Recurrente'];

  let totalIng = 0, totalGastosOp = 0, totalRetiros = 0, totalImpuestos = 0, totalTx = rows.length;
  let totalRecurrente = 0, totalNuevo = 0;

  // Monthly aggregation
  const monthMap = {};
  rows.forEach(r => {
    const mes = r.Mes;
    if (!mes) return;
    if (!monthMap[mes]) monthMap[mes] = { ingresos: 0, gastosOp: 0, retiros: 0, impuestos: 0, recurrente: 0, nuevo: 0 };
    const monto = parseMonto(r['Monto MXN']);
    const cat = r['Categoría'] || r['Categoria'] || 'Otro';
    if (r.Tipo === 'Ingreso') {
      monthMap[mes].ingresos += monto;
      totalIng += monto;
      if (RECURRING_CATS.includes(cat)) {
        monthMap[mes].recurrente += monto;
        totalRecurrente += monto;
      } else {
        monthMap[mes].nuevo += monto;
        totalNuevo += monto;
      }
    } else if (r.Tipo === 'Egreso') {
      if (cat === 'Retiro Socio') {
        monthMap[mes].retiros += monto;
        totalRetiros += monto;
      } else if (cat === 'Impuestos') {
        monthMap[mes].impuestos += monto;
        totalImpuestos += monto;
      } else {
        monthMap[mes].gastosOp += monto;
        totalGastosOp += monto;
      }
    }
  });

  const totalEgresos = totalGastosOp + totalRetiros + totalImpuestos;

  // Determine current month to mark as partial
  const currentMonthName = MESES_ORDER[new Date().getMonth()];
  const dayOfMonth = new Date().getDate();

  // Calculate averages from completed months (exclude current month)
  let completedMonths = 0, sumIngCompleted = 0, sumGastosCompleted = 0;
  MESES_ORDER.forEach(mes => {
    if (monthMap[mes] && mes !== currentMonthName) {
      completedMonths++;
      sumIngCompleted += monthMap[mes].ingresos;
      sumGastosCompleted += monthMap[mes].gastosOp;
    }
  });
  const avgIng = completedMonths > 0 ? sumIngCompleted / completedMonths : 0;
  const avgGastos = completedMonths > 0 ? sumGastosCompleted / completedMonths : 0;

  MESES_ORDER.forEach(mes => {
    if (monthMap[mes]) {
      const m = monthMap[mes];
      const isCurrentMonth = (mes === currentMonthName);
      const profitOp = m.ingresos - m.gastosOp;

      // For current month: use FORECAST projection if available, else average
      let projectedIng = null, projectedGastos = null, projectedProfit = null;
      const fc = forecast[mes] || {};
      if (isCurrentMonth && dayOfMonth <= 20) {
        if (fc.ingProyectado > 0) {
          projectedIng = Math.round(fc.ingProyectado);
          projectedGastos = Math.round(fc.gastoProyectado || avgGastos);
          projectedProfit = Math.round(fc.profitProyectado || (fc.ingProyectado - (fc.gastoProyectado || avgGastos)));
        } else if (completedMonths > 0) {
          projectedIng = Math.round(avgIng);
          projectedGastos = Math.round(avgGastos);
          projectedProfit = Math.round(avgIng - avgGastos);
        }
      }

      // Store forecast for all months (for trend line)
      let forecastProfit = null;
      if (fc.profitProyectado > 0) {
        forecastProfit = Math.round(fc.profitProyectado);
      } else if (fc.ingProyectado > 0 && fc.gastoProyectado > 0) {
        forecastProfit = Math.round(fc.ingProyectado - fc.gastoProyectado);
      }

      data.monthly.push({
        mes: mes.substring(0,3),
        mesFull: mes,
        ingresos: Math.round(m.ingresos),
        gastosOp: Math.round(m.gastosOp),
        retiros: Math.round(m.retiros),
        impuestos: Math.round(m.impuestos),
        profitOp: Math.round(profitOp),
        resultadoNeto: Math.round(profitOp - m.impuestos),
        recurrente: Math.round(m.recurrente),
        nuevo: Math.round(m.nuevo),
        isPartial: isCurrentMonth,
        projectedIng,
        projectedGastos,
        projectedProfit,
        forecastProfit
      });
    }
  });

  // Income by type (Recurrente vs Nuevo)
  data.incomeByType = {
    recurrente: Math.round(totalRecurrente),
    nuevo: Math.round(totalNuevo),
    pctRecurrente: totalIng > 0 ? ((totalRecurrente/totalIng)*100).toFixed(1) : 0,
    pctNuevo: totalIng > 0 ? ((totalNuevo/totalIng)*100).toFixed(1) : 0
  };

  // Category aggregation (only operating expenses)
  const incCatMap = {}, expCatMap = {};
  rows.forEach(r => {
    const cat = r['Categoría'] || r['Categoria'] || 'Otro';
    const monto = parseMonto(r['Monto MXN']);
    if (r.Tipo === 'Ingreso') incCatMap[cat] = (incCatMap[cat] || 0) + monto;
    else if (r.Tipo === 'Egreso' && !NON_OPERATING.includes(cat)) expCatMap[cat] = (expCatMap[cat] || 0) + monto;
  });

  data.incomeByCategory = Object.entries(incCatMap).sort((a,b) => b[1]-a[1]).map(([name, value]) => ({ name, value: Math.round(value), pct: totalIng > 0 ? ((value/totalIng)*100).toFixed(1) : 0 }));
  data.expenseByCategory = Object.entries(expCatMap).sort((a,b) => b[1]-a[1]).map(([name, value]) => ({ name, value: Math.round(value), pct: totalGastosOp > 0 ? ((value/totalGastosOp)*100).toFixed(1) : 0 }));

  // Top clients - group by base client name to avoid duplicates
  // Client aliases: map known variations to a canonical name
  const CLIENT_ALIASES = {
    'Capital Park': 'Urbano Park',
    'Encore': 'Urbano Park',
    'Encore San Angel': 'Urbano Park',
    'Capital Park + Encore': 'Urbano Park',
    'Capital Park + Encore San Angel': 'Urbano Park'
  };

  function getBaseClientName(fullName) {
    if (!fullName) return '';
    let name = fullName.trim();
    // Remove common suffixes/patterns
    const separators = [' - ', ' 50%', ' Set Up', ' set up', ' Mensualidad', ' mensualidad', ' Pago ', ' pago ', ' saldo ', ' Saldo ', ' anticipo', ' Anticipo', ' 1era ', ' 2da ', ' 3era '];
    let cutPoint = name.length;
    // Handle " + " carefully - check alias first
    const plusIdx = name.indexOf(' + ');
    if (plusIdx > 0) {
      // Try the full name with + first for alias matching
      const beforePlus = name.substring(0, plusIdx).trim();
      const withPlus = name.substring(0, name.indexOf(' ', plusIdx + 3) > 0 ? name.indexOf(' ', plusIdx + 3) : name.length).trim();
      if (CLIENT_ALIASES[withPlus]) return CLIENT_ALIASES[withPlus];
      if (CLIENT_ALIASES[name.trim()]) return CLIENT_ALIASES[name.trim()];
    }
    separators.forEach(sep => {
      const idx = name.indexOf(sep);
      if (idx > 2 && idx < cutPoint) cutPoint = idx;
    });
    name = name.substring(0, cutPoint).trim();
    name = name.replace(/\s+(Inicial|Set|Up|De|de)$/i, '').trim();
    // Apply alias mapping
    if (CLIENT_ALIASES[name]) return CLIENT_ALIASES[name];
    return name;
  }

  const clientMap = {};
  rows.filter(r => r.Tipo === 'Ingreso' && r.Cliente).forEach(r => {
    const baseName = getBaseClientName(r.Cliente);
    clientMap[baseName] = (clientMap[baseName] || 0) + (parseMonto(r['Monto MXN']));
  });
  data.topClients = Object.entries(clientMap).sort((a,b) => b[1]-a[1]).slice(0,10).map(([name, total]) => ({ name, total: Math.round(total) }));

  const profitOp = totalIng - totalGastosOp;
  const resultadoNeto = profitOp - totalImpuestos;

  data.totals = {
    ingresos: Math.round(totalIng),
    gastosOp: Math.round(totalGastosOp),
    totalEgresos: Math.round(totalEgresos),
    retiros: Math.round(totalRetiros),
    impuestos: Math.round(totalImpuestos),
    profitOp: Math.round(profitOp),
    resultadoNeto: Math.round(resultadoNeto),
    margenOp: totalIng > 0 ? ((profitOp/totalIng)*100).toFixed(1) : 0,
    margenNeto: totalIng > 0 ? ((resultadoNeto/totalIng)*100).toFixed(1) : 0,
    transacciones: totalTx,
    ratioGastos: totalIng > 0 ? ((totalGastosOp/totalIng)*100).toFixed(1) : 0,
    numCategorias: Object.keys(incCatMap).length,
    numMeses: Object.keys(monthMap).length,
    topCliente: data.topClients[0] ? { name: data.topClients[0].name, pct: totalIng > 0 ? ((data.topClients[0].total/totalIng)*100).toFixed(1) : 0 } : { name: '-', pct: 0 }
  };

  return data;
}

function render(data) {
  const d = data.totals;
  const now = new Date();

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
          <svg class="logo-img" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <rect width="120" height="120" rx="16" fill="#090909"/>
            <g transform="translate(60,58)" fill="none" stroke="#c59b3f" stroke-width="5" stroke-linecap="round">
              <!-- T top bar with wings -->
              <line x1="-36" y1="-38" x2="36" y2="-38"/>
              <line x1="-36" y1="-38" x2="-42" y2="-44"/>
              <line x1="36" y1="-38" x2="42" y2="-44"/>
              <!-- T vertical stem -->
              <line x1="0" y1="-38" x2="0" y2="44"/>
              <!-- C circle -->
              <path d="M 24,-6 A 26,26 0 1,0 24,12" stroke-width="5.5"/>
              <!-- Bottom point -->
              <line x1="0" y1="44" x2="-4" y2="50"/>
              <line x1="0" y1="44" x2="4" y2="50"/>
            </g>
            <!-- Gold fill accents -->
            <g transform="translate(60,58)" fill="#c59b3f">
              <circle cx="-42" cy="-44" r="3"/>
              <circle cx="42" cy="-44" r="3"/>
              <circle cx="0" cy="50" r="3.5"/>
            </g>
          </svg>
          <h1 class="title">Finanzas Trichter 2026</h1>
        </div>
        <p class="subtitle">Dashboard financiero en tiempo real</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <span class="last-update">Actualizado: ${now.toLocaleString('es-MX')}</span>
        <button class="refresh-btn" onclick="loadDashboard()">↻ Actualizar</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi" style="border-color:var(--green-dim);background:linear-gradient(135deg,var(--card),#3dbb7d08)">
        <div class="kpi-icon">$</div>
        <div class="kpi-label">Ingresos Totales</div>
        <div class="kpi-value" style="color:var(--green)">${fmt(d.ingresos)}</div>
        <div class="kpi-sub">${d.numMeses} meses con datos</div>
      </div>
      <div class="kpi" style="border-color:var(--red-dim);background:linear-gradient(135deg,var(--card),#e0454508)">
        <div class="kpi-icon">$</div>
        <div class="kpi-label">Gastos Operativos</div>
        <div class="kpi-value" style="color:var(--red)">${fmt(d.gastosOp)}</div>
        <div class="kpi-sub">${d.ratioGastos}% de ingresos</div>
      </div>
      <div class="kpi" style="border-color:var(--accent-dim);background:linear-gradient(135deg,var(--card),#c59b3f08)">
        <div class="kpi-icon">$</div>
        <div class="kpi-label">Profit Operativo</div>
        <div class="kpi-value" style="color:var(--accent)">${fmt(d.profitOp)}</div>
        <div class="kpi-sub">Margen ${d.margenOp}%</div>
      </div>
      <div class="kpi" style="border-color:var(--accent-dim);background:linear-gradient(135deg,var(--card),#c59b3f06)">
        <div class="kpi-icon">$</div>
        <div class="kpi-label">Resultado Neto</div>
        <div class="kpi-value" style="color:${d.resultadoNeto >= 0 ? 'var(--accent-light)' : 'var(--red)'}">${fmt(d.resultadoNeto)}</div>
        <div class="kpi-sub">Después de impuestos</div>
      </div>
    </div>

    <div id="secondaryKpis"></div>

    <div class="section-title"><span style="font-size:22px">📊</span><h2>Ingresos vs Gastos por Mes</h2><div class="line"></div></div>
    <div class="chart-card"><canvas id="barChart" height="140"></canvas></div>

    <div class="section-title"><span style="font-size:22px">📈</span><h2>Tendencia de Profit</h2><div class="line"></div></div>
    <div class="chart-card"><canvas id="profitChart" height="100"></canvas></div>

    <div class="section-title"><span style="font-size:22px">🔄</span><h2>Ingresos: Recurrente vs Nuevo</h2><div class="line"></div></div>
    <div class="chart-card">
      <canvas id="incomeTypeChart" height="100"></canvas>
      <div id="incomeTypeSummary" style="margin-top:16px"></div>
    </div>

    <div class="section-title"><span style="font-size:22px">📂</span><h2>Desglose por Categorías</h2><div class="line"></div></div>
    <div class="two-col">
      <div class="chart-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><span style="font-size:18px">💰</span><h3 style="font-size:17px;font-weight:700;font-family:'Poppins',sans-serif">Ingresos</h3></div>
        <canvas id="incomePie" height="180"></canvas>
        <div id="incomeLegend" style="margin-top:16px"></div>
      </div>
      <div class="chart-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><span style="font-size:18px">💸</span><h3 style="font-size:17px;font-weight:700;font-family:'Poppins',sans-serif">Gastos</h3></div>
        <canvas id="expensePie" height="180"></canvas>
        <div id="expenseLegend" style="margin-top:16px"></div>
      </div>
    </div>

    <div class="section-title"><span style="font-size:22px">🏢</span><h2>Top Clientes por Facturación</h2><div class="line"></div></div>
    <div class="chart-card" id="clientsSection"></div>

    <div class="section-title"><span style="font-size:22px">🩺</span><h2>Indicadores de Salud Financiera</h2><div class="line"></div></div>
    <div class="health-grid">
      <div class="health-card">
        <div class="health-label">Ratio Gastos/Ingresos</div>
        <div class="health-value" style="color:${parseFloat(d.ratioGastos) < 40 ? 'var(--accent)' : parseFloat(d.ratioGastos) < 60 ? 'var(--gold)' : 'var(--red)'}">${d.ratioGastos}%</div>
        <div class="health-desc">Solo gastos operativos</div>
      </div>
      <div class="health-card">
        <div class="health-label">Top Cliente</div>
        <div class="health-value" style="color:${parseFloat(d.topCliente.pct) < 30 ? 'var(--blue)' : 'var(--gold)'}">${d.topCliente.pct}%</div>
        <div class="health-desc">${d.topCliente.name}</div>
      </div>
      <div class="health-card">
        <div class="health-label">Diversificación</div>
        <div class="health-value" style="color:${d.numCategorias >= 6 ? 'var(--accent)' : d.numCategorias >= 4 ? 'var(--gold)' : 'var(--red)'}">${d.numCategorias} categorías</div>
        <div class="health-desc">Meta: 6+</div>
      </div>
      <div class="health-card">
        <div class="health-label">Meses con Data</div>
        <div class="health-value" style="color:var(--text-1)">${d.numMeses} de 12</div>
        <div class="health-desc">${d.numMeses >= 3 ? 'Q' + Math.ceil(d.numMeses/3) + ' completo' : 'En progreso'}</div>
      </div>
    </div>

    <div class="footer"><p>Trichter Consulting · Dashboard Financiero · Datos en tiempo real</p></div>
  `;

  // Render secondary KPIs (retiros, impuestos, etc.)
  if (d.retiros > 0 || d.impuestos > 0) {
    document.getElementById('secondaryKpis').innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:32px">' +
        '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px">' +
          '<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-family:\'JetBrains Mono\',monospace;margin-bottom:4px">Retiros Socios</div>' +
          '<div style="font-size:22px;font-weight:700;color:var(--purple);font-family:\'Poppins\',sans-serif">' + fmt(d.retiros) + '</div>' +
          '<div style="font-size:11px;color:var(--text-3);margin-top:2px">Distribución de utilidades</div>' +
        '</div>' +
        '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px">' +
          '<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-family:\'JetBrains Mono\',monospace;margin-bottom:4px">Impuestos</div>' +
          '<div style="font-size:22px;font-weight:700;color:var(--gold);font-family:\'Poppins\',sans-serif">' + fmt(d.impuestos) + '</div>' +
          '<div style="font-size:11px;color:var(--text-3);margin-top:2px">Obligaciones fiscales</div>' +
        '</div>' +
        '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px">' +
          '<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-family:\'JetBrains Mono\',monospace;margin-bottom:4px">Total Egresos</div>' +
          '<div style="font-size:22px;font-weight:700;color:var(--text-2);font-family:\'Poppins\',sans-serif">' + fmt(d.totalEgresos) + '</div>' +
          '<div style="font-size:11px;color:var(--text-3);margin-top:2px">Operativos + retiros + imp.</div>' +
        '</div>' +
        '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px">' +
          '<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-family:\'JetBrains Mono\',monospace;margin-bottom:4px">Transacciones</div>' +
          '<div style="font-size:22px;font-weight:700;color:var(--text-1);font-family:\'Poppins\',sans-serif">' + d.transacciones + '</div>' +
          '<div style="font-size:11px;color:var(--text-3);margin-top:2px">Movimientos registrados</div>' +
        '</div>' +
      '</div>';
  }

  // Render Charts
  Chart.defaults.color = '#8a8070';
  Chart.defaults.borderColor = '#1f1d1a';
  Chart.defaults.font.family = "'JetBrains Mono', monospace";

  // Bar Chart - with projected values for current month
  const barIngData = data.monthly.map(m => m.isPartial && m.projectedIng ? m.projectedIng : m.ingresos);
  const barGastosData = data.monthly.map(m => m.isPartial && m.projectedGastos ? m.projectedGastos : m.gastosOp);
  const barIngColors = data.monthly.map(m => m.isPartial && m.projectedIng ? '#3dbb7d55' : '#3dbb7d');
  const barGastosColors = data.monthly.map(m => m.isPartial && m.projectedGastos ? '#e0454555' : '#e04545');
  const barIngBorders = data.monthly.map(m => m.isPartial && m.projectedIng ? '#3dbb7d' : 'transparent');
  const barGastosBorders = data.monthly.map(m => m.isPartial && m.projectedGastos ? '#e04545' : 'transparent');
  const barLabels = data.monthly.map(m => m.isPartial ? m.mes + ' (proy.)' : m.mes);

  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: barLabels,
      datasets: [
        { label: 'Ingresos', data: barIngData, backgroundColor: barIngColors, borderColor: barIngBorders, borderWidth: 2, borderRadius: 6, borderDash: data.monthly.map(m => m.isPartial ? [4,4] : []) },
        { label: 'Gastos Op.', data: barGastosData, backgroundColor: barGastosColors, borderColor: barGastosBorders, borderWidth: 2, borderRadius: 6 }
      ]
    },
    options: { responsive: true, plugins: { legend: { labels: { font: { family: "'Poppins'" } } } }, scales: { y: { ticks: { callback: v => fmt(v) }, grid: { color: '#1f1d1a33' } } } }
  });

  // Profit Area Chart - with forecast line from FORECAST tab
  const profitData = data.monthly.map(m => m.isPartial && m.projectedProfit !== null ? m.projectedProfit : m.profitOp);
  const forecastData = data.monthly.map(m => m.forecastProfit);
  const hasForecast = forecastData.some(v => v !== null && v > 0);
  const profitPointStyles = data.monthly.map(m => m.isPartial ? 'rectRot' : 'circle');
  const profitPointRadius = data.monthly.map(m => m.isPartial ? 7 : 5);

  var profitDatasets = [
    { label: 'Profit Real', data: profitData, borderColor: '#c59b3f', backgroundColor: '#c59b3f22', fill: true, tension: 0.3, pointRadius: profitPointRadius, pointStyle: profitPointStyles, pointBackgroundColor: '#c59b3f', borderWidth: 3, segment: { borderDash: function(ctx) { return data.monthly[ctx.p1DataIndex] && data.monthly[ctx.p1DataIndex].isPartial ? [6,3] : undefined; } } }
  ];
  if (hasForecast) {
    profitDatasets.push({ label: 'Profit Proyectado (Forecast)', data: forecastData, borderColor: '#5a9fd4', backgroundColor: '#5a9fd411', fill: false, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#5a9fd4', borderWidth: 2, borderDash: [6,4] });
  }

  new Chart(document.getElementById('profitChart'), {
    type: 'line',
    data: { labels: barLabels, datasets: profitDatasets },
    options: { responsive: true, plugins: { legend: { labels: { font: { family: "'Poppins'" } } } }, scales: { y: { ticks: { callback: v => fmt(v) } } } }
  });

  // Income Type Chart (Recurrente vs Nuevo)
  new Chart(document.getElementById('incomeTypeChart'), {
    type: 'bar',
    data: {
      labels: data.monthly.map(m => m.mes),
      datasets: [
        { label: 'Recurrente', data: data.monthly.map(m => m.recurrente), backgroundColor: '#c59b3f', borderRadius: 6 },
        { label: 'Nuevo', data: data.monthly.map(m => m.nuevo), backgroundColor: '#5a9fd4', borderRadius: 6 }
      ]
    },
    options: { responsive: true, plugins: { legend: { labels: { font: { family: "'Poppins'" } } } }, scales: { x: { stacked: true }, y: { stacked: true, ticks: { callback: v => fmt(v) }, grid: { color: '#1f1d1a33' } } } }
  });

  // Income Type Summary
  var iType = data.incomeByType;
  document.getElementById('incomeTypeSummary').innerHTML =
    '<div style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center">' +
      '<div style="text-align:center">' +
        '<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-family:\'JetBrains Mono\',monospace">Recurrente</div>' +
        '<div style="font-size:24px;font-weight:700;color:#c59b3f;font-family:\'Playfair Display\',serif">' + fmt(iType.recurrente) + '</div>' +
        '<div style="font-size:12px;color:var(--text-3)">' + iType.pctRecurrente + '% del total</div>' +
      '</div>' +
      '<div style="text-align:center">' +
        '<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-family:\'JetBrains Mono\',monospace">Nuevo</div>' +
        '<div style="font-size:24px;font-weight:700;color:#5a9fd4;font-family:\'Playfair Display\',serif">' + fmt(iType.nuevo) + '</div>' +
        '<div style="font-size:12px;color:var(--text-3)">' + iType.pctNuevo + '% del total</div>' +
      '</div>' +
    '</div>';

  // Income Pie
  new Chart(document.getElementById('incomePie'), {
    type: 'doughnut',
    data: { labels: data.incomeByCategory.map(c => c.name), datasets: [{ data: data.incomeByCategory.map(c => c.value), backgroundColor: COLORS.slice(0, data.incomeByCategory.length), borderWidth: 0 }] },
    options: { responsive: true, cutout: '60%', plugins: { legend: { display: false } } }
  });
  document.getElementById('incomeLegend').innerHTML = data.incomeByCategory.map((c,i) => `<div class="cat-item"><div style="display:flex;align-items:center"><div class="cat-dot" style="background:${COLORS[i]}"></div><span class="cat-name">${c.name}</span></div><div style="display:flex;align-items:center"><span class="cat-value">${fmt(c.value)}</span><span class="cat-pct">${c.pct}%</span></div></div>`).join('');

  // Expense Pie
  const expColors = ['#e04545','#d46a5a','#9b7fd4','#5a9fd4','#e0a56a','#7eb89e','#c5763f','#8a7060'];
  new Chart(document.getElementById('expensePie'), {
    type: 'doughnut',
    data: { labels: data.expenseByCategory.map(c => c.name), datasets: [{ data: data.expenseByCategory.map(c => c.value), backgroundColor: expColors.slice(0, data.expenseByCategory.length), borderWidth: 0 }] },
    options: { responsive: true, cutout: '60%', plugins: { legend: { display: false } } }
  });
  document.getElementById('expenseLegend').innerHTML = data.expenseByCategory.map((c,i) => `<div class="cat-item"><div style="display:flex;align-items:center"><div class="cat-dot" style="background:${expColors[i]}"></div><span class="cat-name">${c.name}</span></div><div style="display:flex;align-items:center"><span class="cat-value">${fmt(c.value)}</span><span class="cat-pct">${c.pct}%</span></div></div>`).join('');

  // Clients
  const maxClient = data.topClients[0] ? data.topClients[0].total : 1;
  document.getElementById('clientsSection').innerHTML = data.topClients.map((c,i) => `
    <div class="client-row">
      <span class="client-rank">${i+1}</span>
      <div class="client-info">
        <div class="client-header"><span class="client-name">${c.name}</span><span class="client-total">${fmt(c.total)} MXN</span></div>
        <div class="client-bar"><div class="client-bar-fill" style="width:${(c.total/maxClient*100)}%;background:linear-gradient(90deg,${COLORS[i]},${COLORS[i]}88)"></div></div>
      </div>
    </div>
  `).join('');
}

async function loadDashboard() {
  try {
    document.getElementById('app').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Cargando datos de Google Sheets...</p></div>';
    const [rows, forecast] = await Promise.all([fetchSheetData(), fetchForecastData()]);
    const data = processData(rows, forecast);
    render(data);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="loading"><p style="color:var(--red)">Error cargando datos: ${err.message}</p><p style="margin-top:12px;color:var(--text-2)">Verificá que la planilla esté compartida como "Cualquiera con el enlace puede ver"</p><button class="refresh-btn" style="margin-top:16px" onclick="loadDashboard()">Reintentar</button></div>`;
  }
}

loadDashboard();
// Auto-refresh every 5 minutes
setInterval(loadDashboard, 5 * 60 * 1000);
</script>
</body>
</html>
