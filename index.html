<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanzas Trichter Consulting 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23090909'/><text y='22' x='4' font-size='18' font-weight='bold' fill='%23c59b3f'>TC</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #090909; --card: #111111; --border: #1f1d1a;
      --accent: #c59b3f; --accent-dim: #c59b3f22;
      --accent-light: #d4af5a; --accent-dark: #a07e2e;
      --gold: #c59b3f;
      --red: #e04545; --red-dim: #e0454522;
      --green: #3dbb7d; --green-dim: #3dbb7d22;
      --blue: #5a9fd4; --purple: #9b7fd4;
      --text-1: #f2ece0; --text-2: #8a8070; --text-3: #5a5348;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text-1); font-family: 'Poppins', -apple-system, sans-serif; padding: 0 20px 60px; min-height: 100vh; }
    .header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
    .logo-img { width: 48px; height: 48px; border-radius: 10px; }
    .title { font-size: 28px; font-weight: 700; font-family: 'Poppins', sans-serif; color: var(--accent); }
    .subtitle { font-size: 14px; color: var(--text-2); font-family: 'Poppins', sans-serif; }
    .last-update { font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; }
    .refresh-btn { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
    .refresh-btn:hover { background: var(--accent); color: var(--bg); }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 28px; position: relative; overflow: hidden; transition: transform 0.2s; }
    .kpi:hover { transform: translateY(-2px); }
    .kpi-icon { position: absolute; top: -20px; right: -20px; font-size: 80px; opacity: 0.06; }
    .kpi-label { font-size: 12px; color: var(--text-2); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
    .kpi-value { font-size: 36px; font-weight: 700; font-family: 'Poppins', sans-serif; line-height: 1.1; }
    .kpi-sub { font-size: 13px; color: var(--text-3); margin-top: 8px; }
    .kpi-trend { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; margin-right: 6px; }
    .section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; margin-top: 40px; }
    .section-title h2 { font-size: 20px; font-weight: 700; font-family: 'Poppins', sans-serif; color: var(--text-1); }
    .section-title .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent-dark), transparent); margin-left: 12px; }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .two-col { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
    .cat-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .cat-dot { width: 10px; height: 10px; border-radius: 3px; margin-right: 10px; }
    .cat-name { font-size: 13px; color: var(--text-2); }
    .cat-value { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .cat-pct { font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; width: 40px; text-align: right; margin-left: 12px; }
    .client-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .client-rank { font-size: 14px; font-weight: 700; color: var(--text-3); font-family: 'JetBrains Mono', monospace; width: 24px; }
    .client-info { flex: 1; }
    .client-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .client-name { font-size: 14px; font-weight: 600; }
    .client-total { font-size: 14px; font-weight: 600; color: var(--accent-light); font-family: 'JetBrains Mono', monospace; }
    .client-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .client-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease-out; }
    .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .health-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .health-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
    .health-value { font-size: 24px; font-weight: 700; font-family: 'Poppins', sans-serif; }
    .health-desc { font-size: 12px; color: var(--text-3); margin-top: 4px; }
    .person-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 16px; }
    .person-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .person-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
    .person-info { flex: 1; min-width: 0; }
    .person-name { font-size: 13px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .person-total { font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent-light); }
    .person-pct { font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    .loading { text-align: center; padding: 60px; color: var(--text-2); }
    .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 48px; padding: 20px 0; border-top: 1px solid var(--border); text-align: center; }
    .footer p { font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
    @media (max-width: 768px) {
      .kpi-value { font-size: 28px; }
      .title { font-size: 22px; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Cargando datos de Google Sheets...</p>
  </div>
</div>
<script>
// ============================================================
// CONFIGURACIÓN - Cambiar estos valores
// ============================================================
const SPREADSHEET_ID = '1wI5pQfW_rGrwoH56DpdBaiIavHNSdNgwreOCIsJyTWs';
const SHEET_NAME = 'REGISTRO';
const HEADER_ROW = 3; // Row where headers are (ID, Fecha, Mes, etc.)
// ============================================================
const COLORS = ['#c59b3f','#d4af5a','#a07e2e','#5a9fd4','#9b7fd4','#3dbb7d','#e0a56a','#7eb89e'];
// Distinct palette for people (nómina/retiros)
const PERSON_COLORS = ['#c59b3f','#5a9fd4','#9b7fd4','#3dbb7d','#e0a56a','#7eb89e','#d46a5a','#8a7060','#6a8db6','#b69b6a'];
const MESES_ORDER = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ============================================================
// REGISTRO DE PERSONAS
// Para cada alias detectado en "Notas" mapeamos al nombre canónico.
// Agregar más alias acá si aparecen en la planilla.
// ============================================================
const PEOPLE_ALIASES = {
  'eugenia': 'Eugenia',
  'euge':    'Eugenia',
  'jesus':   'Jesus',
  'jesús':   'Jesus',
  'jesu':    'Jesus',
  'axel':    'Axel',
  'benjamin':'Benjamin',
  'benjamín':'Benjamin',
  'benja':   'Benjamin',
  'cristian':'Cristian',
  'christian':'Cristian',
  'cris':    'Cristian',
  'quimey':  'Quimey',
  'liliana': 'Liliana',
  'lili':    'Liliana'
};

function stripAccents(str) {
  return String(str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Busca el nombre canónico en un texto (Notas / Concepto / etc.).
// Devuelve null si no encuentra coincidencias.
function extractPerson(text) {
  if (!text) return null;
  const lower = stripAccents(String(text).toLowerCase());
  // Ordenar por longitud descendente para priorizar coincidencias largas (ej. "benjamin" antes que "benja")
  const aliases = Object.keys(PEOPLE_ALIASES).sort((a,b) => b.length - a.length);
  for (const alias of aliases) {
    const aliasNorm = stripAccents(alias.toLowerCase());
    const re = new RegExp('(^|[^a-z0-9])' + aliasNorm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '($|[^a-z0-9])', 'i');
    if (re.test(lower)) return PEOPLE_ALIASES[alias];
  }
  return null;
}

// Lee la primera columna no vacía entre los nombres candidatos del row
function getField(row, candidates) {
  for (const k of candidates) {
    if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== '') return row[k];
  }
  return '';
}

function parseMonto(str) {
  if (!str && str !== 0) return 0;
  if (typeof str === 'number') return str; // Already a number (from JSON)
  // Remove currency text (MXN, USD, $) and spaces
  let cleaned = String(str).replace(/[A-Za-z$\s]/g, '');
  if (cleaned.includes(',') && cleaned.includes('.')) {
    if (cleaned.lastIndexOf(',') > cleaned.lastIndexOf('.')) {
      cleaned = cleaned.replace(/\./g, '').replace(',', '.');
    } else {
      cleaned = cleaned.replace(/,/g, '');
    }
  } else if (cleaned.includes(',')) {
    const parts = cleaned.split(',');
    if (parts[parts.length - 1].length === 2) {
      cleaned = cleaned.replace(',', '.');
    } else {
      cleaned = cleaned.replace(/,/g, '');
    }
  } else if (cleaned.includes('.')) {
    const dotParts = cleaned.split('.');
    if (dotParts.length > 2) {
      cleaned = cleaned.replace(/\./g, '');
    } else if (dotParts[1] && dotParts[1].length === 3 && parseFloat(cleaned) >= 1) {
      cleaned = cleaned.replace('.', '');
    }
  }
  return parseFloat(cleaned) || 0;
}

function fmt(n) {
  const num = parseFloat(n) || 0;
  if (num >= 1000000) return '$' + (num/1000000).toFixed(1) + 'M';
  if (num >= 1000) return '$' + Math.round(num).toLocaleString('es-MX');
  return '$' + num;
}

// Parse gviz JSON response → array of objects with header keys
function parseGvizJSON(text) {
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start === -1 || end === -1) return [];
  const jsonStr = text.substring(start, end + 1);
  const data = JSON.parse(jsonStr);
  if (!data.table || !data.table.cols || !data.table.rows) return [];
  const headers = data.table.cols.map(c => (c.label || c.id || '').trim());
  const rows = [];
  data.table.rows.forEach(row => {
    const obj = {};
    row.c.forEach((cell, idx) => {
      if (!headers[idx]) return;
      if (cell === null) { obj[headers[idx]] = ''; return; }
      const val = cell.v;
      if (val === null || val === undefined) {
        obj[headers[idx]] = cell.f || '';
      } else if (typeof val === 'number') {
        obj[headers[idx]] = val;
      } else {
        obj[headers[idx]] = String(val);
      }
    });
    rows.push(obj);
  });
  return rows;
}

async function fetchGvizSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  const text = await res.text();
  if (!text || text.includes('<!DOCTYPE')) return [];
  return parseGvizJSON(text);
}

async function fetchSheetData() {
  const rows = await fetchGvizSheet(SHEET_NAME);
  return rows.filter(r => r.Tipo);
}

async function fetchForecastData() {
  try {
    const rows = await fetchGvizSheet('FORECAST');
    const forecast = {};
    rows.forEach(r => {
      const mes = (r.Mes || '').trim();
      const concepto = (r.Concepto || '').trim();
      if (!mes) return;
      if (!forecast[mes]) forecast[mes] = {};
      const proy = typeof r.Proyectado === 'number' ? r.Proyectado : parseMonto(r.Proyectado);
      if (concepto === 'Total Ingresos') forecast[mes].ingProyectado = proy;
      if (concepto === 'Total Gastos') forecast[mes].gastoProyectado = proy;
      if (concepto === 'Profit') forecast[mes].profitProyectado = proy;
    });
    return forecast;
  } catch (e) {
    return {};
  }
}

function processData(rows, forecast) {
  forecast = forecast || {};
  const data = { monthly: [], incomeByCategory: [], expenseByCategory: [], topClients: [], totals: {}, incomeByType: {}, payroll: {}, withdrawals: {} };
  const NON_OPERATING = ['Retiro Socio', 'Impuestos'];

  function isRecurringIncome(row) {
    const subcat = (row['Subcategoría'] || row['Subcategoria'] || '').trim().toLowerCase();
    const cat = (row['Categoría'] || row['Categoria'] || '').trim();
    if (cat === 'Software Recurrente') return true;
    if (subcat === 'mensualidad') return true;
    return false;
  }

  // Columnas candidato donde puede aparecer el nombre de la persona
  const NOTE_COLS = ['Notas','Nota','Notes','Concepto','Descripción','Descripcion','Detalle','Observaciones','Observacion','Comentario','Comentarios'];

  let totalIng = 0, totalGastosOp = 0, totalRetiros = 0, totalImpuestos = 0, totalNomina = 0, totalTx = rows.length;
  let totalRecurrente = 0, totalNuevo = 0;

  // Estructuras para nómina y retiros por persona
  const payrollPersonMonth = {};      // { mes: { persona: monto } }
  const withdrawalPersonMonth = {};   // { mes: { persona: monto } }
  const payrollPersonTotal = {};      // { persona: total }
  const withdrawalPersonTotal = {};   // { persona: total }

  // Monthly aggregation
  const monthMap = {};
  rows.forEach(r => {
    const mes = r.Mes;
    if (!mes) return;
    if (!monthMap[mes]) monthMap[mes] = { ingresos: 0, gastosOp: 0, retiros: 0, impuestos: 0, nomina: 0, recurrente: 0, nuevo: 0 };
    const monto = parseMonto(r['Monto MXN']);
    const cat = r['Categoría'] || r['Categoria'] || 'Otro';

    if (r.Tipo === 'Ingreso') {
      monthMap[mes].ingresos += monto;
      totalIng += monto;
      if (isRecurringIncome(r)) {
        monthMap[mes].recurrente += monto;
        totalRecurrente += monto;
      } else {
        monthMap[mes].nuevo += monto;
        totalNuevo += monto;
      }
    } else if (r.Tipo === 'Egreso') {
      if (cat === 'Retiro Socio') {
        monthMap[mes].retiros += monto;
        totalRetiros += monto;
        // Identificar persona
        const notes = getField(r, NOTE_COLS);
        const person = extractPerson(notes) || extractPerson(r.Cliente) || 'Sin identificar';
        if (!withdrawalPersonMonth[mes]) withdrawalPersonMonth[mes] = {};
        withdrawalPersonMonth[mes][person] = (withdrawalPersonMonth[mes][person] || 0) + monto;
        withdrawalPersonTotal[person] = (withdrawalPersonTotal[person] || 0) + monto;
      } else if (cat === 'Impuestos') {
        monthMap[mes].impuestos += monto;
        totalImpuestos += monto;
      } else {
        monthMap[mes].gastosOp += monto;
        totalGastosOp += monto;
        // Detectar nómina (Nómina/Nomina/Sueldos/Honorarios)
        const catNorm = stripAccents(cat).toLowerCase();
        if (catNorm === 'nomina' || catNorm === 'sueldos' || catNorm === 'honorarios') {
          monthMap[mes].nomina += monto;
          totalNomina += monto;
          const notes = getField(r, NOTE_COLS);
          const person = extractPerson(notes) || extractPerson(r.Cliente) || 'Sin identificar';
          if (!payrollPersonMonth[mes]) payrollPersonMonth[mes] = {};
          payrollPersonMonth[mes][person] = (payrollPersonMonth[mes][person] || 0) + monto;
          payrollPersonTotal[person] = (payrollPersonTotal[person] || 0) + monto;
        }
      }
    }
  });

  const totalEgresos = totalGastosOp + totalRetiros + totalImpuestos;

  // Determine current month to mark as partial
  const currentMonthName = MESES_ORDER[new Date().getMonth()];
  const dayOfMonth = new Date().getDate();

  // Calculate averages from completed months
  let completedMonths = 0, sumIngCompleted = 0, sumGastosCompleted = 0;
  MESES_ORDER.forEach(mes => {
    if (monthMap[mes] && mes !== currentMonthName) {
      completedMonths++;
      sumIngCompleted += monthMap[mes].ingresos;
      sumGastosCompleted += monthMap[mes].gastosOp;
    }
  });
  const avgIng = completedMonths > 0 ? sumIngCompleted / completedMonths : 0;
  const avgGastos = completedMonths > 0 ? sumGastosCompleted / completedMonths : 0;

  MESES_ORDER.forEach(mes => {
    if (monthMap[mes]) {
      const m = monthMap[mes];
      const isCurrentMonth = (mes === currentMonthName);
      const profitOp = m.ingresos - m.gastosOp;
      let projectedIng = null, projectedGastos = null, projectedProfit = null;
      const fc = forecast[mes] || {};
      if (isCurrentMonth && dayOfMonth <= 20) {
        if (fc.ingProyectado > 0) {
          projectedIng = Math.round(fc.ingProyectado);
          projectedGastos = Math.round(fc.gastoProyectado || avgGastos);
          projectedProfit = Math.round(fc.profitProyectado || (fc.ingProyectado - (fc.gastoProyectado || avgGastos)));
        } else if (completedMonths > 0) {
          projectedIng = Math.round(avgIng);
          projectedGastos = Math.round(avgGastos);
          projectedProfit = Math.round(avgIng - avgGastos);
        }
      }
      let forecastProfit = null;
      if (fc.profitProyectado > 0) {
        forecastProfit = Math.round(fc.profitProyectado);
      } else if (fc.ingProyectado > 0 && fc.gastoProyectado > 0) {
        forecastProfit = Math.round(fc.ingProyectado - fc.gastoProyectado);
      }
      data.monthly.push({
        mes: mes.substring(0,3),
        mesFull: mes,
        ingresos: Math.round(m.ingresos),
        gastosOp: Math.round(m.gastosOp),
        retiros: Math.round(m.retiros),
        impuestos: Math.round(m.impuestos),
        nomina: Math.round(m.nomina),
        profitOp: Math.round(profitOp),
        resultadoNeto: Math.round(profitOp - m.impuestos),
        recurrente: Math.round(m.recurrente),
        nuevo: Math.round(m.nuevo),
        isPartial: isCurrentMonth,
        projectedIng,
        projectedGastos,
        projectedProfit,
        forecastProfit
      });
    }
  });

  // Income type
  data.incomeByType = {
    recurrente: Math.round(totalRecurrente),
    nuevo: Math.round(totalNuevo),
    pctRecurrente: totalIng > 0 ? ((totalRecurrente/totalIng)*100).toFixed(1) : 0,
    pctNuevo: totalIng > 0 ? ((totalNuevo/totalIng)*100).toFixed(1) : 0
  };

  // Category aggregation
  const incCatMap = {}, expCatMap = {};
  rows.forEach(r => {
    const cat = r['Categoría'] || r['Categoria'] || 'Otro';
    const monto = parseMonto(r['Monto MXN']);
    if (r.Tipo === 'Ingreso') incCatMap[cat] = (incCatMap[cat] || 0) + monto;
    else if (r.Tipo === 'Egreso' && !NON_OPERATING.includes(cat)) expCatMap[cat] = (expCatMap[cat] || 0) + monto;
  });
  data.incomeByCategory = Object.entries(incCatMap).sort((a,b) => b[1]-a[1]).map(([name, value]) => ({ name, value: Math.round(value), pct: totalIng > 0 ? ((value/totalIng)*100).toFixed(1) : 0 }));
  data.expenseByCategory = Object.entries(expCatMap).sort((a,b) => b[1]-a[1]).map(([name, value]) => ({ name, value: Math.round(value), pct: totalGastosOp > 0 ? ((value/totalGastosOp)*100).toFixed(1) : 0 }));

  // Top clients
  const CLIENT_ALIASES = {
    'Capital Park': 'Urbano Park',
    'Encore': 'Urbano Park',
    'Encore San Angel': 'Urbano Park',
    'Capital Park + Encore': 'Urbano Park',
    'Capital Park + Encore San Angel': 'Urbano Park'
  };
  function getBaseClientName(fullName) {
    if (!fullName) return '';
    let name = fullName.trim();
    const separators = [' - ', ' 50%', ' Set Up', ' set up', ' Mensualidad', ' mensualidad', ' Pago ', ' pago ', ' saldo ', ' Saldo ', ' anticipo', ' Anticipo', ' 1era ', ' 2da ', ' 3era '];
    let cutPoint = name.length;
    const plusIdx = name.indexOf(' + ');
    if (plusIdx > 0) {
      const withPlus = name.substring(0, name.indexOf(' ', plusIdx + 3) > 0 ? name.indexOf(' ', plusIdx + 3) : name.length).trim();
      if (CLIENT_ALIASES[withPlus]) return CLIENT_ALIASES[withPlus];
      if (CLIENT_ALIASES[name.trim()]) return CLIENT_ALIASES[name.trim()];
    }
    separators.forEach(sep => {
      const idx = name.indexOf(sep);
      if (idx > 2 && idx < cutPoint) cutPoint = idx;
    });
    name = name.substring(0, cutPoint).trim();
    name = name.replace(/\s+(Inicial|Set|Up|De|de)$/i, '').trim();
    if (CLIENT_ALIASES[name]) return CLIENT_ALIASES[name];
    return name;
  }
  const clientMap = {};
  rows.filter(r => r.Tipo === 'Ingreso' && r.Cliente).forEach(r => {
    const baseName = getBaseClientName(r.Cliente);
    clientMap[baseName] = (clientMap[baseName] || 0) + (parseMonto(r['Monto MXN']));
  });
  data.topClients = Object.entries(clientMap).sort((a,b) => b[1]-a[1]).slice(0,10).map(([name, total]) => ({ name, total: Math.round(total) }));

  // ============================================================
  // Datos Nómina y Retiros por persona
  // ============================================================
  const monthsWithData = MESES_ORDER.filter(m => monthMap[m]);

  const payrollPeople = Object.keys(payrollPersonTotal).sort((a,b) => payrollPersonTotal[b] - payrollPersonTotal[a]);
  const withdrawalPeople = Object.keys(withdrawalPersonTotal).sort((a,b) => withdrawalPersonTotal[b] - withdrawalPersonTotal[a]);

  const payrollGrand = Object.values(payrollPersonTotal).reduce((a,b) => a+b, 0);
  const withdrawalGrand = Object.values(withdrawalPersonTotal).reduce((a,b) => a+b, 0);

  data.payroll = {
    people: payrollPeople,
    totalsByPerson: payrollPersonTotal,
    monthly: monthsWithData.map(m => ({
      mes: m.substring(0,3),
      mesFull: m,
      values: payrollPersonMonth[m] || {},
      total: Object.values(payrollPersonMonth[m] || {}).reduce((a,b) => a+b, 0)
    })),
    grandTotal: Math.round(payrollGrand)
  };

  data.withdrawals = {
    people: withdrawalPeople,
    totalsByPerson: withdrawalPersonTotal,
    monthly: monthsWithData.map(m => ({
      mes: m.substring(0,3),
      mesFull: m,
      values: withdrawalPersonMonth[m] || {},
      total: Object.values(withdrawalPersonMonth[m] || {}).reduce((a,b) => a+b, 0)
    })),
    grandTotal: Math.round(withdrawalGrand)
  };

  const profitOp = totalIng - totalGastosOp;
  const resultadoNeto = profitOp - totalImpuestos;
  data.totals = {
    ingresos: Math.round(totalIng),
    gastosOp: Math.round(totalGastosOp),
    totalEgresos: Math.round(totalEgresos),
    retiros: Math.round(totalRetiros),
    impuestos: Math.round(totalImpuestos),
    nomina: Math.round(totalNomina),
    profitOp: Math.round(profitOp),
    resultadoNeto: Math.round(resultadoNeto),
    margenOp: totalIng > 0 ? ((profitOp/totalIng)*100).toFixed(1) : 0,
    margenNeto: totalIng > 0 ? ((resultadoNeto/totalIng)*100).toFixed(1) : 0,
    transacciones: totalTx,
    ratioGastos: totalIng > 0 ? ((totalGastosOp/totalIng)*100).toFixed(1) : 0,
    numCategorias: Object.keys(incCatMap).length,
    numMeses: Object.keys(monthMap).length,
    topCliente: data.topClients[0] ? { name: data.topClients[0].name, pct: totalIng > 0 ? ((data.topClients[0].total/totalIng)*100).toFixed(1) : 0 } : { name: '-', pct: 0 }
  };
  return data;
}

// Construye el HTML de las tarjetitas por persona (leyenda con totales)
function renderPersonLegend(people, totalsByPerson, grandTotal) {
  if (!people.length) {
    return '<div style="color:var(--text-3);font-size:13px;text-align:center;padding:20px">No hay registros para mostrar.</div>';
  }
  return '<div class="person-grid">' + people.map((p, i) => {
    const t = totalsByPerson[p] || 0;
    const pct = grandTotal > 0 ? ((t/grandTotal)*100).toFixed(1) : 0;
    const color = PERSON_COLORS[i % PERSON_COLORS.length];
    return '<div class="person-card">' +
      '<span class="person-dot" style="background:' + color + '"></span>' +
      '<div class="person-info">' +
        '<div class="person-name">' + p + '</div>' +
        '<div class="person-total">' + fmt(t) + '</div>' +
        '<div class="person-pct">' + pct + '% del total</div>' +

    '</div>';
  }).join('') + '</div>';
}

  new Chart(document.getElementById('expensePie'), {
    type: 'doughnut',
    data: { labels: data.expenseByCategory.map(c => c.name), datasets: [{ data: data.expenseByCategory.map(c => c.value), backgroundColor: expColors.slice(0, data.expenseByCategory.length), borderWidth: 0 }] },
    options: { responsive: true, cutout: '60%', plugins: { legend: { display: false } } }
  });
  document.getElementById('expenseLegend').innerHTML = data.expenseByCategory.map((c,i) => `<div class="cat-item"><div style="display:flex;align-items:center"><div class="cat-dot" style="background:${expColors[i]}"></div><span class="cat-name">${c.name}</span></div><div style="display:flex;align-items:center"><span class="cat-value">${fmt(c.value)}</span><span class="cat-pct">${c.pct}%</span></div></div>`).join('');

  // Clients
  const maxClient = data.topClients[0] ? data.topClients[0].total : 1;
  document.getElementById('clientsSection').innerHTML = data.topClients.map((c,i) => `
    <div class="client-row">
      <span class="client-rank">${i+1}</span>
      <div class="client-info">
        <div class="client-header"><span class="client-name">${c.name}</span><span class="client-total">${fmt(c.total)} MXN</span></div>
        <div class="client-bar"><div class="client-bar-fill" style="width:${(c.total/maxClient*100)}%;background:linear-gradient(90deg,${COLORS[i]},${COLORS[i]}88)"></div></div>
      </div>
    </div>
  `).join('');
}

async function loadDashboard() {
  try {
    document.getElementById('app').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Cargando datos de Google Sheets...</p></div>';
    const [rows, forecast] = await Promise.all([fetchSheetData(), fetchForecastData()]);
    const data = processData(rows, forecast);
    render(data);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="loading"><p style="color:var(--red)">Error cargando datos: ${err.message}</p><p style="margin-top:12px;color:var(--text-2)">Verificá que la planilla esté compartida como "Cualquiera con el enlace puede ver"</p><button class="refresh-btn" style="margin-top:16px" onclick="loadDashboard()">Reintentar</button></div>`;
  }
}

loadDashboard();
setInterval(loadDashboard, 5 * 60 * 1000);
</script>
</body>
</html>
